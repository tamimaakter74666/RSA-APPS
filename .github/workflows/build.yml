name: Android Build Pipeline

on:
  push:
    branches:
      - main
      - master
      - 'feature/*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Verify Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Regenerate Gradle Wrapper Jar
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 9.3.1

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode Android Release Keystore (Optional Fallback)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            echo "Release key decoded and prepared."
          else
            echo "Optional secret RELEASE_KEYSTORE_BASE64 is empty. Release sign config will fall back safely to debug sign."
          fi

      - name: Run Build (Assemble Release & Debug APKs)
        env:
          KEYSTORE_PATH: "my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Build both debug and release variants
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Locate Built APKs
        run: |
          mkdir -p build-outputs
          
          # Find and copy debug APK
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ ! -z "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" build-outputs/rimon_sports_debug.apk
            echo "Copied debug APK."
          fi
          
          # Find and copy release APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ ! -z "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" build-outputs/rimon_sports_release.apk
            echo "Copied release APK."
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rimon_sports_debug_apk
          path: build-outputs/rimon_sports_debug.apk
          if-no-files-found: warn

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rimon_sports_release_apk
          path: build-outputs/rimon_sports_release.apk
          if-no-files-found: warn
