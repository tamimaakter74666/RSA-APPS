name: Android Build Pipeline

on:
  push:
    branches:
      - main
      - master
      - 'feature/*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Verify Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Regenerate Gradle Wrapper Jar
        run: |
          rm -f gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 9.3.1

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode Android Release Keystore (Optional Fallback)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
            echo "Release key decoded and prepared."
          else
            echo "Optional secret RELEASE_KEYSTORE_BASE64 is empty. Release sign config will fall back safely to debug sign."
          fi

      - name: Run Build (Assemble Release & Debug APKs)
        env:
          KEYSTORE_PATH: "my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Build both debug and release variants
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Locate Built APKs
        run: |
          mkdir -p build-outputs
          
          # Find and copy debug APK
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ ! -z "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" build-outputs/rimon_sports_debug.apk
            echo "Copied debug APK."
          fi
          
          # Find and copy release APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ ! -z "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" build-outputs/rimon_sports_release.apk
            echo "Copied release APK."
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rimon_sports_debug_apk
          path: build-outputs/rimon_sports_debug.apk
          if-no-files-found: warn

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rimon_sports_release_apk
          path: build-outputs/rimon_sports_release.apk
          if-no-files-found: warn

      - name: Commit and Push Compiled APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          if [ -f build-outputs/rimon_sports_debug.apk ]; then
            # Copy APKs to repo root
            cp build-outputs/rimon_sports_debug.apk app-debug.apk
            cp build-outputs/rimon_sports_release.apk app-release.apk
            
            # Create zip backups of the APKs
            zip -j app-debug.zip app-debug.apk
            zip -j app-release.zip app-release.apk
            
            # Setup Git config for automated bot
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            # Git add the updated files
            git add app-debug.apk app-debug.zip app-release.apk app-release.zip
            
            # Commit and push only if changes exist
            if ! git diff-index --quiet HEAD --; then
              git commit -m "chore: auto-publish latest actions build apk and zip [skip ci]"
              git push origin HEAD:${{ github.ref }}
              echo "Successfully pushed latest APK back to repository!"
            else
              echo "No functional changes to commit."
            fi
          else
            echo "Error: Built APK was not found, skipping publish step."
          fi

      - name: Create or Update Latest Rolling Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: latest
          name: "Latest Automated Build"
          body: |
            ### Latest System Builds
            This release contains the absolute latest fully optimized built binaries compiled automatically by GitHub Actions on every commit to the main/master branch.
            
            - **Primary Release APK (Standard Install - 13.1 MB)**: [rimon_sports_release.apk](https://github.com/tamimaakter74666/RSA-APPS/releases/download/latest/rimon_sports_release.apk)
            - **Backup Release Zip**: [app-release.zip](https://github.com/tamimaakter74666/RSA-APPS/releases/download/latest/app-release.zip)
            - **Developer Debug APK (17.7 MB)**: [rimon_sports_debug.apk](https://github.com/tamimaakter74666/RSA-APPS/releases/download/latest/rimon_sports_debug.apk)
          draft: false
          prerelease: true
          files: |
            build-outputs/rimon_sports_release.apk
            build-outputs/rimon_sports_debug.apk
            app-release.zip
            app-debug.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
